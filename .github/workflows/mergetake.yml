name: MergeTake

# Triggers:
#   - when the `mergetake` label is added to a PR (initial run)
#   - when a labelled PR gets new commits (refresh the walkthrough)
on:
  pull_request:
    types: [labeled, synchronize]

# OIDC permissions — `id-token: write` lets the runner mint a short-lived
# JWT that proves "this CI run came from this repo" to mergetake.com.
# Replaces the api-key approach. No long-lived secrets to rotate.
permissions:
  id-token: write
  contents: read
  pull-requests: read

jobs:
  mergetake:
    if: >
      (github.event.action == 'labeled' && github.event.label.name == 'mergetake')
      || (github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'mergetake'))
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          # Need history for diff against the base SHA.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Boot the dev server in the background so the recorder can drive it
      # at http://localhost:3456 below. Adjust port + readiness probe if
      # `npm run dev` listens elsewhere in your project.
      - name: Start dev server
        run: |
          npm run dev > dev-server.log 2>&1 &
          echo "$!" > dev-server.pid
          for i in $(seq 1 90); do
            if curl -sf http://localhost:3456 >/dev/null 2>&1; then
              echo "Dev server ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Dev server didn't respond on :3456 within 90s"
          echo "--- dev-server.log ---"
          cat dev-server.log
          exit 1

      - uses: mergetake/action@v1
        with:
          service-url: https://eye-service.fly.dev
          oidc-audience: https://mergetake.com
          app-url: http://localhost:3456

      - name: Stop dev server
        if: always()
        run: |
          if [ -f dev-server.pid ]; then
            kill "$(cat dev-server.pid)" 2>/dev/null || true
          fi
